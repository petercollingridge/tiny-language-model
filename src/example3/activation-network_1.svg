<svg id="activation-network" viewBox="0 0 680 390" xmlns="http://www.w3.org/2000/svg">

<style>
  .node circle {
    fill: none;
    stroke: #111;
    stroke-width: 1;
  }
  .node .active circle {
    fill: rgb(0, 63, 92);
    stroke: rgb(0, 63, 92);
    stroke-width: 1;
  }
  .node text {
    dominant-baseline: middle;
  }
  .node .active text {
    fill: rgb(255, 0, 175);
  }
  .node .deactive text {
    fill: rgb(200, 200, 200);
  }
  .input-node {
    text-anchor: end;
  }
  .output-node {
    text-anchor: start;
  }
  .node text.activation-value {
    text-anchor: middle;
    font-size: 10px;
    fill: #fff;
    opacity: 0;
  }
  .output-node.deactive text {
    opacity: 0;
  }
  .node .active text.activation-value {
    opacity: 1;
  }
  .edge line {
    stroke-width: 2;
    stroke: currentColor;
    marker-end: url(#arrow);
  }
  .hit-box {
    opacity: 0.1;
  }
  </style>

