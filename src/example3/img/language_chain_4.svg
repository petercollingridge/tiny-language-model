<svg id="simple_chain" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

<style>
  .node circle {
    fill: none;
    stroke: #111;
    stroke-width: 1;
  }
  .node text {
    dominant-baseline: middle;
  }
  .edge line, .edge path {
    fill: none;
    stroke-width: 2;
    stroke: rgb(45, 125, 122);
    marker-end: url(#arrow);
  }
  .hit-box {
    opacity: 0;
  }
  </style>

    <defs>
        <marker id="arrow" viewBox="0 0 15 15" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="rgb(45, 125, 122)"/>
        </marker>
    </defs>

    <rect x="0" y="0" width="500" height="500" fill="#ddd"/>
    <g class="node">
        <circle cx="30" cy="250" r="20"/>
        <text x="30" y="220" text-anchor="middle" class="label">&lt;BR&gt;</text>

        <circle cx="230" cy="250" r="20"/>
        <text x="220" y="220" text-anchor="end" class="label">sheep</text>

        <circle cx="230" cy="50" r="20"/>
        <text x="230" y="20" text-anchor="middle" class="label">are</text>

        <circle cx="430" cy="50" r="20"/>
        <text x="430" y="20" text-anchor="middle" class="label">slow / herbivores</text>

        <circle cx="30" cy="450" r="20"/>
        <text x="30" y="480" text-anchor="middle" class="label">wolves</text>

        <circle cx="230" cy="450" r="20"/>
        <text x="230" y="480" text-anchor="middle" class="label">eat</text>

        <circle cx="430" cy="250" r="20"/>
        <text x="455" y="250" class="label">&lt;BR&gt;</text>

        <circle cx="430" cy="450" r="20"/>
        <text x="430" y="480" text-anchor="middle" class="label">grass</text>

    </g>
    <g class="edge edge-arrow">
        <line x1="52" y1="250" x2="204" y2="250"/>
        <line x1="230" y1="228" x2="230" y2="76"/>
        <line x1="30" y1="272" x2="30" y2="424"/>
        <line x1="52" y1="450" x2="204" y2="450"/>
        <line x1="252" y1="250" x2="404" y2="250"/>
        <line x1="252" y1="450" x2="404" y2="450"/>
        <line x1="252" y1="50" x2="404" y2="50"/>
        <line x1="430" y1="428" x2="430" y2="276"/>
        <line x1="430" y1="72" x2="430" y2="224"/>

        <path d="M215 268 A100 100 0 0 0 215 428"/>
        <path d="M245 430 A100 100 0 0 0 247 270"/>

    </g>
</svg>